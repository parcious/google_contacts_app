name: google_contacts_app
description: "A Google Contacts clone built with Flutter - Contact Management App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  sqflite: ^2.4.2
  path: ^1.9.1
  provider: ^6.1.2
  url_launcher: ^6.3.1
  intl: ^0.20.2
  flutter_slidable: ^3.1.1
  google_fonts: ^6.2.1
  flutter_phone_direct_caller: ^2.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
